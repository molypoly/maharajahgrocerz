<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Maharajah Grocerz — Kelowna's Premier South Asian Grocery Store</title>
    <meta name="description" content="Kelowna's premier destination for authentic Indian, South Asian & Middle Eastern groceries. Open daily 8AM–11PM at 150 Asher Rd, Kelowna BC." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Inter:wght@300;400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- Netlify form detection -->
    <form name="product-request" data-netlify="true" hidden>
      <input type="text" name="name" />
      <input type="text" name="contact" />
      <textarea name="product"></textarea>
    </form>

    <!-- Google Translate -->
    <script type="text/javascript">
      function googleTranslateElementInit() {
        new google.translate.TranslateElement(
          {
            pageLanguage: 'en',
            includedLanguages: 'en,pa,hi',
            autoDisplay: false,
          },
          'google_translate_element'
        );
      }
    </script>
    <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- Google Maps + Places API -->
    <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAfDKmwY3DuHXsvcjo6fLdYkAs2hosVM-g&libraries=places" async defer></script>

  </body>
</html>
